<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBridge 管理控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: #141414;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #222;
        }
        .sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
        .sidebar-header p { font-size: 11px; color: #555; margin-top: 2px; }
        .nav { flex: 1; padding: 8px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #888;
            border-left: 2px solid transparent;
            transition: all 0.15s;
        }
        .nav-item:hover { color: #ccc; background: #1a1a1a; }
        .nav-item.active { color: #4a9eff; border-left-color: #4a9eff; background: #1a2030; }
        .nav-icon { font-size: 15px; width: 18px; text-align: center; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #222; }
        .logout-btn {
            width: 100%;
            background: none;
            border: 1px solid #333;
            border-radius: 6px;
            color: #888;
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

        /* 主内容区 */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            padding: 14px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #141414;
        }
        .topbar-title { font-size: 15px; font-weight: 600; color: #fff; }
        .status-badges { display: flex; gap: 8px; }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-green { background: #1a3a1a; color: #4caf50; border: 1px solid #2a5a2a; }
        .badge-red { background: #3a1a1a; color: #f44336; border: 1px solid #5a2a2a; }
        .badge-yellow { background: #3a3a1a; color: #ffb300; border: 1px solid #5a5a2a; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* 页面 */
        .page { display: none; }
        .page.active { display: block; }

        /* 卡片 */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* 状态网格 */
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .stat-item { background: #111; border-radius: 8px; padding: 16px; }
        .stat-label { font-size: 11px; color: #666; margin-bottom: 6px; }
        .stat-value { font-size: 24px; font-weight: 700; color: #fff; }
        .stat-sub { font-size: 11px; color: #555; margin-top: 4px; }

        /* 截图 */
        .screenshot-container {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .screenshot-container img { width: 100%; display: block; }
        .screenshot-placeholder { color: #444; font-size: 13px; }
        .screenshot-actions { display: flex; gap: 8px; margin-top: 12px; }

        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .btn-primary { background: #4a9eff; color: #fff; }
        .btn-primary:hover { background: #3a8eef; }
        .btn-danger { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2a2a; }
        .btn-danger:hover { background: #4a2a2a; }
        .btn-secondary { background: #222; color: #aaa; border: 1px solid #333; }
        .btn-secondary:hover { background: #2a2a2a; color: #ccc; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 日志 */
        .log-container {
            background: #0a0a0a;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
        }
        .log-entry { padding: 2px 0; line-height: 1.6; }
        .log-time { color: #555; margin-right: 8px; }
        .log-source { margin-right: 6px; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
        .log-source-browser { background: #1a2a3a; color: #4a9eff; }
        .log-source-forwarder { background: #1a3a1a; color: #4caf50; }
        .log-source-system { background: #2a2a1a; color: #ffb300; }
        .log-msg-info { color: #ccc; }
        .log-msg-warning { color: #ffb300; }
        .log-msg-error { color: #ff6b6b; }
        .log-msg-debug { color: #555; }
        .log-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .log-filter { display: flex; gap: 6px; }
        .filter-btn {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #888;
            transition: all 0.15s;
        }
        .filter-btn.active { border-color: #4a9eff; color: #4a9eff; background: #1a2030; }
        .auto-scroll-label { font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; margin-left: auto; }
        input[type="checkbox"] { accent-color: #4a9eff; }

        /* 设置编辑器 */
        .settings-editor {
            width: 100%;
            height: 400px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        .settings-editor:focus { border-color: #4a9eff; }
        .settings-actions { display: flex; gap: 8px; margin-top: 12px; }
        .save-msg { font-size: 12px; padding: 6px 12px; border-radius: 6px; }
        .save-msg-ok { background: #1a3a1a; color: #4caf50; }
        .save-msg-err { background: #3a1a1a; color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>ChatBridge</h1>
            <p>管理控制台</p>
        </div>
        <nav class="nav">
            <div class="nav-item active" onclick="showPage('dashboard')">
                <span class="nav-icon">📊</span> 概览
            </div>
            <div class="nav-item" onclick="showPage('browser')">
                <span class="nav-icon">🌐</span> 浏览器
            </div>
            <div class="nav-item" onclick="showPage('logs')">
                <span class="nav-icon">📋</span> 日志
            </div>
            <div class="nav-item" onclick="showPage('settings')">
                <span class="nav-icon">⚙️</span> 设置
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title" id="pageTitle">概览</span>
            <div class="status-badges">
                <span class="badge badge-red" id="badge-browser">浏览器 离线</span>
                <span class="badge badge-red" id="badge-ws">WebSocket 0</span>
            </div>
        </div>

        <div class="content">
            <!-- 概览页 -->
            <div class="page active" id="page-dashboard">
                <div class="card">
                    <div class="card-title">系统状态</div>
                    <div class="status-grid">
                        <div class="stat-item">
                            <div class="stat-label">浏览器状态</div>
                            <div class="stat-value" id="stat-browser">-</div>
                            <div class="stat-sub" id="stat-browser-url">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">WebSocket 连接数</div>
                            <div class="stat-value" id="stat-ws">0</div>
                            <div class="stat-sub">SillyTavern 扩展</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">待处理请求</div>
                            <div class="stat-value" id="stat-futures">0</div>
                            <div class="stat-sub" id="stat-futures-sub">队列空闲</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">最后错误</div>
                            <div class="stat-value" style="font-size:13px;color:#ff6b6b" id="stat-error">无</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">最新日志</div>
                    <div class="log-container" id="dashboard-log" style="height:200px"></div>
                </div>
            </div>

            <!-- 浏览器页 -->
            <div class="page" id="page-browser">
                <div class="card">
                    <div class="card-title">浏览器预览</div>
                    <div class="screenshot-container" id="screenshot-container">
                        <span class="screenshot-placeholder">暂无截图</span>
                    </div>
                    <div class="screenshot-actions">
                        <button class="btn btn-secondary" onclick="refreshScreenshot()">刷新截图</button>
                        <button class="btn btn-danger" id="restartBtn" onclick="restartBrowser()">重启浏览器</button>
                    </div>
                </div>
            </div>

            <!-- 日志页 -->
            <div class="page" id="page-logs">
                <div class="card">
                    <div class="card-title">实时日志</div>
                    <div class="log-controls">
                        <div class="log-filter">
                            <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
                            <button class="filter-btn" onclick="setFilter('browser', this)">浏览器</button>
                            <button class="filter-btn" onclick="setFilter('forwarder', this)">转发器</button>
                            <button class="filter-btn" onclick="setFilter('error', this)">错误</button>
                        </div>
                        <label class="auto-scroll-label">
                            <input type="checkbox" id="autoScroll" checked> 自动滚动
                        </label>
                        <button class="btn btn-secondary" style="padding:3px 10px;font-size:11px" onclick="clearLogs()">清空</button>
                    </div>
                    <div class="log-container" id="log-container"></div>
                </div>
            </div>

            <!-- 设置页 -->
            <div class="page" id="page-settings">
                <div class="card">
                    <div class="card-title">settings.json</div>
                    <textarea class="settings-editor" id="settings-editor" spellcheck="false"></textarea>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="saveSettings()">保存</button>
                        <button class="btn btn-secondary" onclick="loadSettings()">重新加载</button>
                        <span id="save-msg"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let allLogs = [];
        let sseSource = null;

        // 页面切换
        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            event.currentTarget.classList.add('active');
            const titles = { dashboard: '概览', browser: '浏览器', logs: '日志', settings: '设置' };
            document.getElementById('pageTitle').textContent = titles[name];
            if (name === 'browser') refreshScreenshot();
            if (name === 'settings') loadSettings();
        }

        // 状态轮询
        async function pollStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) return;
                const data = await res.json();

                const browser = data.browser || {};
                const forwarder = data.forwarder || {};

                // 更新badge
                const bBadge = document.getElementById('badge-browser');
                if (browser.is_running) {
                    bBadge.textContent = '浏览器 在线';
                    bBadge.className = 'badge badge-green';
                } else {
                    bBadge.textContent = '浏览器 离线';
                    bBadge.className = 'badge badge-red';
                }

                const wsCount = forwarder.websocket_clients || 0;
                const wsBadge = document.getElementById('badge-ws');
                wsBadge.textContent = `WebSocket ${wsCount}`;
                wsBadge.className = wsCount > 0 ? 'badge badge-green' : 'badge badge-red';

                // 更新统计
                document.getElementById('stat-browser').textContent = browser.is_running ? '运行中' : '已停止';
                document.getElementById('stat-browser').style.color = browser.is_running ? '#4caf50' : '#f44336';
                document.getElementById('stat-browser-url').textContent = browser.st_url || '-';
                document.getElementById('stat-ws').textContent = wsCount;

                const pending = forwarder.pending_requests || 0;
                const isProcessing = forwarder.is_processing || false;
                document.getElementById('stat-futures').textContent = pending;
                const subEl = document.getElementById('stat-futures-sub');
                if (isProcessing) {
                    subEl.textContent = '处理中，' + pending + ' 个等待';
                    subEl.style.color = '#ffb300';
                } else {
                    subEl.textContent = '队列空闲';
                    subEl.style.color = '#555';
                }
                const err = browser.last_error;
                document.getElementById('stat-error').textContent = err ? err.substring(0, 40) + '...' : '无';

            } catch (e) {}
        }

        // 截图
        async function refreshScreenshot() {
            try {
                const res = await fetch('/api/screenshot');
                const container = document.getElementById('screenshot-container');
                if (res.ok) {
                    const data = await res.json();
                    container.innerHTML = `<img src="data:image/jpeg;base64,${data.screenshot}" alt="截图">`;
                } else {
                    container.innerHTML = '<span class="screenshot-placeholder">暂无截图</span>';
                }
            } catch (e) {}
        }

        // 重启浏览器
        async function restartBrowser() {
            const btn = document.getElementById('restartBtn');
            btn.disabled = true;
            btn.textContent = '重启中...';
            try {
                await fetch('/api/browser/restart', { method: 'POST' });
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '重启浏览器';
                }, 5000);
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '重启浏览器';
            }
        }

        // 日志
        function renderLog(entry) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.dataset.source = entry.source;
            div.dataset.level = entry.level;
            const srcClass = `log-source-${entry.source}`;
            const msgClass = `log-msg-${entry.level}`;
            div.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-source ${srcClass}">${entry.source}</span><span class="${msgClass}">${escHtml(entry.message)}</span>`;
            return div;
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function appendLog(entry, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const div = renderLog(entry);
            container.appendChild(div);
            if (document.getElementById('autoScroll')?.checked) {
                container.scrollTop = container.scrollHeight;
            }
            // 限制DOM数量
            while (container.children.length > 500) {
                container.removeChild(container.firstChild);
            }
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilter();
        }

        function applyFilter() {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            const filtered = allLogs.filter(l => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'error') return l.level === 'error' || l.level === 'warning';
                return l.source === currentFilter;
            });
            filtered.forEach(l => {
                const div = renderLog(l);
                container.appendChild(div);
            });
            if (document.getElementById('autoScroll')?.checked) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function clearLogs() {
            allLogs = [];
            document.getElementById('log-container').innerHTML = '';
            document.getElementById('dashboard-log').innerHTML = '';
        }

        // SSE连接
        function connectSSE() {
            if (sseSource) sseSource.close();
            sseSource = new EventSource('/api/logs/stream');
            sseSource.onmessage = (e) => {
                const entry = JSON.parse(e.data);
                allLogs.push(entry);
                if (allLogs.length > 1000) allLogs = allLogs.slice(-1000);

                // 日志页
                if (currentFilter === 'all' ||
                    (currentFilter === 'error' && (entry.level === 'error' || entry.level === 'warning')) ||
                    entry.source === currentFilter) {
                    appendLog(entry, 'log-container');
                }

                // 概览页
                appendLog(entry, 'dashboard-log');
            };
            sseSource.onerror = () => {
                setTimeout(connectSSE, 3000);
            };
        }

        // 设置
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('settings-editor').value = data.content;
                }
            } catch (e) {}
        }

        async function saveSettings() {
            const content = document.getElementById('settings-editor').value;
            const msgEl = document.getElementById('save-msg');
            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();
                msgEl.textContent = data.message;
                msgEl.className = 'save-msg ' + (data.success ? 'save-msg-ok' : 'save-msg-err');
                setTimeout(() => { msgEl.textContent = ''; msgEl.className = ''; }, 3000);
            } catch (e) {
                msgEl.textContent = '保存失败';
                msgEl.className = 'save-msg save-msg-err';
            }
        }

        // 登出
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // 初始化
        connectSSE();
        pollStatus();
        setInterval(pollStatus, 5000);
        setInterval(() => {
            if (document.getElementById('page-browser').classList.contains('active')) {
                refreshScreenshot();
            }
        }, 5000);
    </script>
</body>
</html>
